<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>运动休闲鞋整鞋舒适度主观试穿评价</title>
<style>
:root {--primary:#1a1a2e;--accent:#e94560;--bg:#f5f5f5;--card:#fff;--text:#333;--text-light:#888;--border:#e8e8e8;--star:#f0ad4e;--good:#4caf50;--mid:#ff9800;--bad:#f44336;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-tap-highlight-color:transparent;}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;padding:16px 10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04);position:sticky;top:0;z-index:10;}
.step{display:flex;flex-direction:column;align-items:center;}
.step-num{width:24px;height:24px;border-radius:50%;background:#e0e0e0;color:#999;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.step.active .step-num{background:var(--accent);color:#fff;}
.step-label{font-size:10px;color:#999;margin-top:3px;}
.step.active .step-label{color:var(--accent);font-weight:500;}
.step-line{width:24px;height:2px;background:#e0e0e0;margin:0 4px 11px;transition:background .3s;}
.step-line.active{background:var(--accent);}

/* Content */
.content{padding:12px 12px 90px;}
.card{background:var(--card);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.card-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;}
.card-desc{font-size:12px;color:#999;margin:-10px 0 12px;}
.optional-tag{font-size:11px;color:#fff;background:#999;padding:2px 8px;border-radius:4px;margin-left:8px;vertical-align:middle;}
.field{margin-bottom:16px;}
.field-label{font-size:14px;font-weight:500;color:#333;margin-bottom:6px;}
.req{color:var(--accent);}
.field-hint{font-size:11px;color:#999;margin-top:2px;}
.input{width:100%;height:40px;background:#f8f8f8;border-radius:8px;border:2px solid transparent;padding:0 12px;font-size:14px;outline:none;transition:border .2s;}
.input:focus{border-color:var(--accent);background:#fff;}
.input.small{width:120px;}
.input-row{display:flex;align-items:center;gap:8px;}
.input-suffix{font-size:13px;color:#888;white-space:nowrap;}
.chip-group{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:8px 16px;border-radius:20px;background:#f0f0f0;color:#666;font-size:13px;border:2px solid transparent;cursor:pointer;user-select:none;transition:all .2s;}
.chip.active{background:#fff0f3;color:var(--accent);border-color:var(--accent);font-weight:500;}

/* ===== 测试项卡片 ===== */
.test-card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.test-card.star{background:#fffdf5;border-left:4px solid var(--star);}
.test-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.test-num{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.test-card.star .test-num{background:var(--star);color:#fff;}
.test-name{flex:1;font-size:15px;font-weight:600;color:#333;line-height:1.5;}
.star-badge{font-size:10px;color:var(--star);font-weight:600;margin-left:6px;}
.test-subtitle{font-size:12px;color:#999;margin-top:2px;}

/* 选项区 */
.options-area{margin-bottom:12px;}
.options-label{font-size:12px;color:#666;font-weight:500;margin-bottom:6px;}
.option-row{display:flex;gap:8px;flex-wrap:wrap;}
.option-btn{flex:1;min-width:60px;height:38px;line-height:38px;text-align:center;background:#f5f5f5;border-radius:8px;font-size:13px;color:#666;border:2px solid transparent;cursor:pointer;transition:all .2s;user-select:none;}
.option-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;}

/* 评分区 */
.score-area{padding:12px;background:#fafafa;border-radius:8px;}
.score-label{font-size:12px;color:#666;font-weight:500;margin-bottom:8px;}
.score-stars{display:flex;gap:8px;justify-content:center;}
.score-dot{width:36px;height:36px;border-radius:50%;background:#e0e0e0;color:#666;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;user-select:none;}
.score-dot.active{background:var(--accent);color:#fff;transform:scale(1.1);box-shadow:0 2px 8px rgba(233,69,96,.3);}
.score-hint{text-align:center;font-size:12px;color:var(--accent);margin-top:8px;min-height:18px;}

/* 页码导航 */
.page-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0;}
.page-indicator{font-size:13px;color:#999;}
.btn-page{padding:0 20px;height:34px;line-height:34px;background:#f0f0f0;color:#666;font-size:13px;border-radius:20px;border:none;cursor:pointer;}
.btn-page.primary{background:var(--accent);color:#fff;}

/* 汇总页 */
.summary-block{margin-bottom:16px;padding:14px;background:#f8f8f8;border-radius:8px;}
.summary-title{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:8px;}
.summary-row{font-size:13px;color:#555;line-height:2;}
.s-label{color:#999;}
.total-score{font-size:20px;font-weight:700;color:var(--accent);}

/* 舒适等级 */
.comfort-grade{display:inline-block;padding:4px 12px;border-radius:16px;font-size:13px;font-weight:600;margin-left:8px;}
.grade-excellent{background:#e8f5e9;color:#2e7d32;}
.grade-good{background:#fff3e0;color:#ef6c00;}
.grade-ok{background:#fffde7;color:#f9a825;}
.grade-poor{background:#ffebee;color:#c62828;}

/* 进度条 */
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ff6b81);border-radius:4px;transition:width .5s ease;}

.textarea{width:100%;height:100px;background:#f8f8f8;border-radius:8px;padding:12px;font-size:14px;border:2px solid transparent;outline:none;resize:none;font-family:inherit;}
.textarea:focus{border-color:var(--accent);background:#fff;}
.char-count{text-align:right;font-size:11px;color:#bbb;margin-top:4px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:#fff;box-shadow:0 -1px 6px rgba(0,0,0,.06);display:flex;gap:10px;z-index:100;}
.btn-primary{flex:1;height:44px;background:linear-gradient(135deg,#e94560,#c23152);color:#fff;font-size:15px;font-weight:600;border-radius:22px;border:none;cursor:pointer;}
.btn-secondary{width:90px;height:44px;background:#f0f0f0;color:#666;font-size:14px;border-radius:22px;border:none;cursor:pointer;}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* Tab */
.tab-bar{display:flex;background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;}
.tab-item{flex:1;text-align:center;padding:12px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* History */
.history-header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;}
.history-title{font-size:18px;font-weight:700;color:var(--primary);}
.history-count{font-size:13px;color:#999;background:#eee;padding:3px 12px;border-radius:12px;}
.record-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.record-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.record-model{font-size:16px;font-weight:600;color:var(--primary);}
.record-score{font-size:20px;font-weight:700;color:var(--accent);}
.record-info{display:flex;justify-content:space-between;font-size:13px;color:#666;line-height:2;}
.record-time{font-size:12px;color:#bbb;margin-top:6px;}
.record-actions{display:flex;justify-content:flex-end;gap:16px;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;}
.action-link{font-size:13px;color:var(--primary);cursor:pointer;}
.action-link.danger{color:var(--accent);}

/* Export */
.export-option{display:flex;align-items:center;gap:12px;padding:14px;background:#f8f8f8;border-radius:8px;margin-bottom:10px;cursor:pointer;}
.export-option:active{background:#f0f0f0;}
.option-icon{font-size:24px;}
.option-info{flex:1;}
.option-title{font-size:14px;font-weight:500;color:#333;margin-bottom:3px;}
.option-desc{font-size:12px;color:#999;}
.option-arrow{font-size:20px;color:#ccc;}
.stat-row{display:flex;justify-content:space-around;}
.stat-item{text-align:center;}
.stat-num{font-size:24px;font-weight:700;color:var(--accent);}
.stat-label{font-size:12px;color:#999;margin-top:4px;}

/* Home */
.home-hero{text-align:center;padding:30px 0;}
.hero-icon{font-size:56px;margin-bottom:10px;}
.hero-title{font-size:22px;font-weight:700;color:var(--primary);letter-spacing:2px;}
.hero-subtitle{font-size:14px;color:#999;margin-top:4px;}
.guide-item{font-size:13px;color:#555;line-height:2;}
.hl{color:var(--accent);font-weight:600;}
.empty-state{text-align:center;padding:60px 0;}
.empty-icon{font-size:56px;margin-bottom:12px;}
.empty-text{font-size:15px;color:#999;}
</style>
</head>
<body>
<div class="steps" id="stepsBar">
  <div class="step" id="step0"><div class="step-num">1</div><div class="step-label">基础信息</div></div>
  <div class="step-line" id="line0"></div>
  <div class="step" id="step1"><div class="step-num">2</div><div class="step-label">核心测试</div></div>
  <div class="step-line" id="line1"></div>
  <div class="step" id="step2"><div class="step-num">3</div><div class="step-label">拓展测试</div></div>
  <div class="step-line" id="line2"></div>
  <div class="step" id="step3"><div class="step-num">4</div><div class="step-label">确认提交</div></div>
</div>
<div class="content" id="content"></div>
<div class="bottom-bar" id="bottomBar"></div>
<div class="toast" id="toast"></div>

<script>
// ==================== DATA: 34项独立测试 ====================
// 每个测试项都是独立的卡片，包含选项和评分
const allItems = [
  // ===== 核心测试 (24项) =====
  {id:1, name:'鞋面整体的舒适度', opts:['舒适','不舒适'], category:'core'},
  {id:2, name:'内里整体的舒适度', opts:['舒适','不舒适'], category:'core'},
  {id:3, name:'鞋垫（趟底）整体的舒适度', opts:['舒适','不舒适'], category:'core'},
  {id:'3-1', name:'鞋垫软硬度感知', opts:['过软','适中','偏硬'], category:'core', star:true},
  {id:'3-2', name:'穿30min后鞋垫是否塌陷', opts:['是','否'], category:'core', star:true},
  {id:4, name:'走路时鞋子舒适度和整体体感', opts:['舒适','不舒适'], category:'core'},
  {id:5, name:'鞋底前掌弯折是否板脚', opts:['会','不会'], category:'core'},
  {id:'5-1', name:'前掌1/3处能否自然弯折', opts:['是','否'], category:'core', star:true},
  {id:6, name:'鞋中腰足弓支撑位置与贴合度', opts:['舒适','不舒适'], category:'core'},
  {id:7, name:'鞋底止滑性能体感', opts:['好','不好'], category:'core'},
  {id:8, name:'鞋底耐磨性能长期行走体感', opts:['好','不好'], category:'core'},
  {id:9, name:'前掌脚趾活动空间是否充足', opts:['是','否'], category:'core'},
  {id:10, name:'鞋前掌是否磨脚', opts:['是','否'], category:'core'},
  {id:11, name:'鞋后跟或后跟内里是否磨脚', opts:['是','否'], category:'core'},
  {id:12, name:'鞋帮脚踝位置是否磨脚', opts:['是','否'], category:'core'},
  {id:13, name:'行走过程后跟是否滑跟脱脚', opts:['是','否'], category:'core'},
  {id:14, name:'足底压力分布是否均匀', opts:['是','否'], category:'core'},
  {id:15, name:'鞋前掌包裹是否过松晃脚', opts:['会','不会'], category:'core'},
  {id:16, name:'鞋后跟包裹锁定效果', opts:['好','不好'], category:'core'},
  {id:17, name:'鞋身透气性，是否闷热捂脚', opts:['会','不会'], category:'core'},
  {id:18, name:'整鞋重量体感，行走是否笨重', opts:['会','不会'], category:'core'},
  {id:19, name:'长时间行走身体是否后仰失衡', opts:['会','不会'], category:'core'},
  {id:'19-1', name:'单腿站立中底侧倾感', opts:['无','轻微','明显'], category:'core', star:true},
  {id:20, name:'脱袜后足部是否存在压痕、磨红痕迹', opts:['有','没有'], category:'core'},
  // ===== 拓展测试 (10项) =====
  {id:21, name:'鞋舌对脚背的压迫感', opts:['无压迫','轻微压迫','明显挤压'], category:'extra'},
  {id:22, name:'鞋口后帮跟腱摩擦不适感', opts:['顺滑','轻微摩擦','刺痛磨皮'], category:'extra'},
  {id:23, name:'出汗后内里黏脚程度', opts:['干爽','轻微黏腻','严重闷黏'], category:'extra'},
  {id:24, name:'上下楼梯时前掌顶脚情况', opts:['无顶脚','轻微顶脚','强烈挤压'], category:'extra'},
  {id:25, name:'长时间行走后小腿疲劳度', opts:['无疲劳','轻微酸胀','明显酸痛'], category:'extra'},
  {id:26, name:'湿地面行走抓地安全感', opts:['稳定','轻微打滑','容易打滑'], category:'extra', star:true},
  {id:27, name:'鞋垫压缩回弹感知（穿前vs穿30min后跟高差）', opts:['＜2mm','2-5mm','＞5mm'], category:'extra', star:true},
  {id:28, name:'中底弯折点位置判定', opts:['前1/3跖骨处','偏后','偏前'], category:'extra', star:true},
  {id:29, name:'疲劳态复评（60min后重测第4、14、25项）', opts:['同原项规则'], category:'extra', star:true},
  {id:30, name:'路感清晰度', opts:['模糊','适中','清晰'], category:'extra', star:true}
];

const coreItems = allItems.filter(i=>i.category==='core');
const extraItems = allItems.filter(i=>i.category==='extra');
const TOTAL_ITEMS = allItems.length; // 34
const MAX_SCORE = TOTAL_ITEMS * 5; // 170

// 评分标准
const scoreGuide = {
  5:'完全舒适，无任何不适',
  4:'轻微不适，不影响穿着',
  3:'明显不适，可正常穿着但有痛点',
  2:'严重不适，勉强可穿着',
  1:'完全无法正常穿着'
};

// 舒适等级标准
const comfortLevels = [
  {min:153, label:'优秀', cls:'grade-excellent', desc:'舒适度极佳，推荐量产'},
  {min:136, label:'良好', cls:'grade-good', desc:'整体舒适， minor issues可优化'},
  {min:119, label:'一般', cls:'grade-ok', desc:'基本可穿，存在明显痛点需改进'},
  {min:0,  label:'需改进', cls:'grade-poor', desc:'舒适度不足，需大幅改进'}
];

function getComfortLevel(total){
  for(const lv of comfortLevels){if(total>=lv.min)return lv;}
  return comfortLevels[comfortLevels.length-1];
}

const footTypes = [{v:'normal',l:'正常足'},{v:'high_arch',l:'高足弓'},{v:'flat',l:'扁平足'},{v:'wide',l:'宽脚'},{v:'narrow',l:'瘦脚'}];
const sceneOptions = [{v:'commute',l:'平地通勤'},{v:'sport',l:'轻度运动'},{v:'stairs',l:'楼梯行走'},{v:'other',l:'其他'}];
const footMap = Object.fromEntries(footTypes.map(f=>[f.v,f.l]));
const sceneMap = Object.fromEntries(sceneOptions.map(s=>[s.v,s.l]));

const ITEMS_PER_PAGE = 5;
const corePages = [];
for(let i=0;i<coreItems.length;i+=ITEMS_PER_PAGE) corePages.push(coreItems.slice(i,i+ITEMS_PER_PAGE));
const extraPages = [];
for(let i=0;i<extraItems.length;i+=ITEMS_PER_PAGE) extraPages.push(extraItems.slice(i,i+ITEMS_PER_PAGE));

let currentStep = 0, corePageIdx = 0, extraPageIdx = 0, tab = 'home';
let form = {
  modelCode:'',lastShape:'',tester:'',footType:[],duration:'',scene:[],sceneOther:'',
  hardnessInsole:'',hardnessMidsole:'',hardnessOutsole:'',
  items:{}, suggestion:''
};

function getRecords(){try{return JSON.parse(localStorage.getItem('trial_records_v3')||'[]');}catch(e){return[];}}
function saveRecord(r){r.id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);r.createTime=new Date().toISOString();const rec=getRecords();rec.unshift(r);localStorage.setItem('trial_records_v3',JSON.stringify(rec));}
function deleteRecord(id){const rec=getRecords().filter(r=>r.id!==id);localStorage.setItem('trial_records_v3',JSON.stringify(rec));}
function clearAll(){localStorage.setItem('trial_records_v3','[]');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso);const pad=n=>String(n).padStart(2,'0');return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function getTotalScore(){let total=0;Object.values(form.items).forEach(v=>{if(v.score)total+=v.score;});return total;}
function getCompletedCount(){return Object.values(form.items).filter(v=>v.result).length;}
function inArray(arr,val){return arr&&arr.indexOf(val)>-1;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ==================== RENDER ====================
function render(){
  updateSteps();
  const c=document.getElementById('content');
  const b=document.getElementById('bottomBar');
  if(tab==='home'){renderHome(c,b);return;}
  if(tab==='history'){renderHistory(c,b);return;}
  if(tab==='export'){renderExport(c,b);return;}
  if(currentStep===0){syncStep1Inputs();}
  switch(currentStep){case 0:renderStep1(c,b);break;case 1:renderStep2(c,b);break;case 2:renderStep3(c,b);break;case 3:renderStep4(c,b);break;}
}

function updateSteps(){
  for(let i=0;i<4;i++){
    const s=document.getElementById('step'+i);
    s.classList.toggle('active',tab==='form'&&currentStep>=i);
    const l=document.getElementById('line'+i);
    if(l)l.classList.toggle('active',tab==='form'&&currentStep>i);
  }
  document.getElementById('stepsBar').style.display=tab==='form'?'flex':'none';
}

function syncStep1Inputs(){
  ['modelCode','lastShape','tester','duration','sceneOther','hardnessInsole','hardnessMidsole','hardnessOutsole'].forEach(field=>{
    const el=document.getElementById('f_'+field);
    if(el)form[field]=el.value;
  });
}

function switchTab(t){tab=t;if(t==='form'){currentStep=0;corePageIdx=0;extraPageIdx=0;}render();}
function startTrial(){
  tab='form';currentStep=0;corePageIdx=0;extraPageIdx=0;
  form={modelCode:'',lastShape:'',tester:'',footType:[],duration:'',scene:[],sceneOther:'',hardnessInsole:'',hardnessMidsole:'',hardnessOutsole:'',items:{},suggestion:''};
  render();window.scrollTo(0,0);
}
function toggleArr(field,val){const arr=form[field];const idx=arr.indexOf(val);if(idx>-1)arr.splice(idx,1);else arr.push(val);render();}

// === STEP 1: 基础信息 ===
function renderHome(c,b){
  c.innerHTML=`
    <div class="home-hero"><div class="hero-icon">👟</div><div class="hero-title">运动休闲鞋</div><div class="hero-subtitle">整鞋舒适度主观试穿评价 · 升级版</div></div>
    <div class="card"><div class="card-title">📋 填写说明</div>
      <div class="guide-item">• 共 <span class="hl">24项核心测试</span> + 10项拓展测试</div>
      <div class="guide-item">• 新增<span class="hl">硬度实测</span>、<span class="hl">鞋垫塌陷</span>、<span class="hl">疲劳复评</span>等深度维度</div>
      <div class="guide-item">• 预计耗时 <span class="hl">5-8分钟</span></div>
      <div class="guide-item">• 评分1-5分，5分=完全舒适，满分<span class="hl">170分</span></div>

const ITEM_FIELD_ORDER = [
  'star1','star2','star3','star4','star5','star6','star7','star8',
  'star9','star10','star11','star12','star13','star14','star15','star16',
  'star17','star18','star19','star20','star21','star22','star23','star24',

  'normal':    '正常足',
  'high_arch': '高足弓',
  'flat':      '扁平足',
  'wide':      '宽脚',
  'narrow':    '瘦脚'

// 构建Webhook请求数据
function buildWebhookPayload(){
  const now = Date.now();
  const totalScore = getTotalScore();
  const level = getComfortLevel(totalScore).label;

  // 硬度实测文本
  const hardnessText = [
    form.hardnessInsole ? '鞋垫'+form.hardnessInsole+'A' : '',
    form.hardnessMidsole ? '中底'+form.hardnessMidsole+'C' : '',
    form.hardnessOutsole ? '外底'+form.hardnessOutsole+'A' : ''
  ].filter(Boolean).join(' / ') || '';

  // 脚型（单选，取第一个）
  const footTypeText = form.footType.length > 0 ? FOOT_TYPE_MAP[form.footType[0]] || '正常足' : '正常足';

  // 场景文本
  const sceneText = form.scene.map(v => sceneMap[v] || v).join('、') + (form.sceneOther ? '、'+form.sceneOther : '');

  // 构建values
  const values = {};
  values[FIELD_MAP.submitTime] = String(now);
  values[FIELD_MAP.tester] = form.tester.trim() || '';
  values[FIELD_MAP.modelCode] = form.modelCode.trim() || '';
  values[FIELD_MAP.shoeSize] = form.lastShape.trim() || '';  // 楦型暂存鞋码字段
  values[FIELD_MAP.footType] = [{ text: footTypeText }];
  values[FIELD_MAP.scene] = sceneText;
  values[FIELD_MAP.hardness] = hardnessText;

  // 34项测试评分（按顺序映射）
  const allItemIds = allItems.map(i => i.id);
  allItemIds.forEach((itemId, idx) => {
    if (idx < ITEM_FIELD_ORDER.length) {
      const fieldKey = ITEM_FIELD_ORDER[idx];
      const fieldId = FIELD_MAP[fieldKey];
      const itemData = form.items[itemId];
      if (itemData && itemData.score) {
        values[fieldId] = itemData.score;
      } else {
        values[fieldId] = 0;
      }
    }
  });

  values[FIELD_MAP.totalScore] = totalScore;
  values[FIELD_MAP.comfortLevel] = level;
  values[FIELD_MAP.suggestion] = form.suggestion.trim() || '';

  return {
    add_records: [{ values: values }]
  };
}

  const payload = buildWebhookPayload();
  try {
    const resp = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    return data.errcode === 0 || data.ret === 0 || resp.ok;
  } catch(e) {
    console.error('Webhook submit error:', e);
    return false;
  }
}

function submitForm(){
  if(getCompletedCount()===0)return toast('请至少完成一项测试');
  const record = {
    modelCode:form.modelCode.trim(),lastShape:form.lastShape.trim(),tester:form.tester.trim(),
    footType:[...form.footType],duration:form.duration,scene:[...form.scene],sceneOther:form.sceneOther.trim(),
    hardnessInsole:form.hardnessInsole,hardnessMidsole:form.hardnessMidsole,hardnessOutsole:form.hardnessOutsole,
    items:JSON.parse(JSON.stringify(form.items)),
    totalScore:getTotalScore(),suggestion:form.suggestion.trim()
  };
  saveRecord(record);

  // 异步提交到企业微信智能表格
  toast('✅ 提交成功！数据同步中...');
  submitToWebhook().then(ok => {
    if(ok){
      toast('✅ 提交成功！数据已同步到智能表格');
    } else {
      toast('✅ 本地保存成功（云端同步失败，数据仍在本地）');
    }
  }).catch(() => {
    toast('✅ 本地保存成功（云端同步失败，数据仍在本地）');
  });

  setTimeout(()=>{tab='home';render();},2000);
}

function delRecord(id){if(!confirm('确定删除这条记录？'))return;deleteRecord(id);toast('已删除');render();}
function clearAllRecords(){if(!confirm('⚠️ 确定清空全部记录？此操作不可恢复。'))return;clearAll();toast('已清空');render();}

// === CSV EXPORT ===
function buildCSV(){
  const records=getRecords();if(records.length===0){toast('暂无数据可导出');return null;}
  const headers=['序号','提交时间','鞋款货号','楦型','试穿人员','试穿人员脚型','试穿时长(分钟)','测试场景','鞋垫硬度(ShoreA)','中底硬度(ShoreC)','外底硬度(ShoreA)','满意度总分','舒适等级'];
  allItems.forEach(item=>{headers.push(item.name+'(结果)');headers.push(item.name+'(评分)');});
  headers.push('改良建议');
  const escCSV=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
  const lines=[headers.map(escCSV).join(',')];
  records.forEach((r,i)=>{
    const level=getComfortLevel(r.totalScore||0).label;
    const row=[i+1,fmtTime(r.createTime),r.modelCode||'',r.lastShape||'',r.tester||'',(r.footType||[]).map(v=>footMap[v]||v).join('、'),r.duration||'',(r.scene||[]).map(v=>sceneMap[v]||v).join('、'),r.hardnessInsole||'',r.hardnessMidsole||'',r.hardnessOutsole||'',r.totalScore||0,level];
    allItems.forEach(item=>{const d=r.items&&r.items[item.id];row.push(d?d.result:'');row.push(d?d.score:'');});
    row.push(r.suggestion||'');lines.push(row.map(escCSV).join(','));
  });
  return'\uFEFF'+lines.join('\n');
}
function exportCSV(){const csv=buildCSV();if(!csv)return;const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const d=new Date();a.href=url;a.download=`试穿评价数据_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;a.click();URL.revokeObjectURL(url);toast('✅ 下载成功');}
function copyCSV(){const csv=buildCSV();if(!csv)return;navigator.clipboard.writeText(csv).then(()=>toast('✅ 已复制，可粘贴到Excel'));}

render();
</script>
